/* Giữ nguyên phần JS cũ, chỉ bổ sung đoạn kết bị thiếu */
function cpT(t){
  navigator.clipboard.writeText(t).then(()=>{
    toast('Copied');
  });
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2000);
}

function fmt(n){return n.toLocaleString('en-US',{maximumFractionDigits:0});}
function fmtV(n){return n.toLocaleString('en-US',{maximumFractionDigits:0});}
function save(){
  localStorage.setItem('bq',JSON.stringify(quotes));
  localStorage.setItem('bc',JSON.stringify(clients));
}
function render(){renderStats();renderH();renderC();}
